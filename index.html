<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="./style.css" />
        <title>Frontend Mentor | Fylo data storage component</title>
    </head>
    <body>
        <div class="wrapper">
            <div class="navigation__section">
                <div class="navigation__logo">
                    <img src="./images/logo.svg" alt="logo" />
                </div>
                <nav>
                    <a href="#"
                        ><div class="nav-elem">
                            <img
                                src="./images/icon-document.svg"
                                alt="icon-document"
                            /></div
                    ></a>
                    <a href="#"
                        ><div class="nav-elem">
                            <img
                                src="./images/icon-folder.svg"
                                alt="icon-folder"
                            /></div
                    ></a>
                    <a href="#">
                        <div class="nav-elem">
                            <img
                                src="./images/icon-upload.svg"
                                alt="icon-upload"
                            /></div
                    ></a>
                </nav>
            </div>
            <div class="main__section">
                <span>
                    You’ve used <span class="highlight">815 GB</span> of your
                    storage
                </span>
                <div class="main__progress-sec">
                    <div class="main__progress-bar">
                        <div class="main__progress-fill" style="width: 81.5%">
                            <div class="main__progress-circle"></div>
                        </div>
                    </div>
                    <div class="main__progress-text">
                        <span>0 GB</span>
                        <span>1000 GB</span>
                    </div>
                </div>
                <div class="main__notification"><span>185</span> GB Left</div>
            </div>
        </div>

        <footer className="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io?ref=challenge"
                target="_blank"
                rel="noopener noreferrer"
            >
                Frontend Mentor </a
            >. Coded by
            <a
                href="https://github.com/ShamardinaEM"
                target="_blank"
                rel="noopener noreferrer"
            >
                ShamardinaEM</a
            >.
        </footer>
    </body>
</html>
